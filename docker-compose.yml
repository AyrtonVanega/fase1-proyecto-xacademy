version: "3.9"

services:

  mysql:
    image: mysql:8
    container_name: fifa_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fifa_local
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: fifa_backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: fifa_local

  frontend:
    build: ./frontend
    container_name: fifa_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  db_data: