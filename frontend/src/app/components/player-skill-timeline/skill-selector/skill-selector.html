<div class="skill-selector">

    <div *ngFor="let group of skillGroups; trackBy: trackByGroup" class="skill-group">
        <button class="group-header" (click)="toggleGroup(group.title)" type="button">

            <span class="arrow" [class.open]="isOpen(group.title)">
                ▶ 
            </span>
            <span>{{ group.title }}</span>

        </button>

        <div class="skills-container" *ngIf="isOpen(group.title)">

            <label *ngFor="let skill of group.keys; trackBy: trackBySkill" class="skill-checkbox">

                <input type="checkbox" [checked]="isSelected(skill)" (change)="onToggle(skill)" />

                <span>{{ skill.replace('_',' ') | titlecase }}</span>

            </label>

        </div>
    </div>

</div>
