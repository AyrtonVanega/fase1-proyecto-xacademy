<div class="player-skill-timeline-container">

    <!-- Cargando jugador -->
    <div *ngIf="playerLoading">
        <h2>Timeline de Habilidades</h2>
        <p>Cargando jugador...</p>
    </div>

    <!-- Error -->
    <div *ngIf="!playerLoading && !player">
        <h2>Jugador no encontrado</h2>
    </div>

    <!-- Jugador cargado -->
    <div *ngIf="!playerLoading && player">

        <h2 class="timeline-title">
            Timeline de Habilidades para {{ player.long_name }}
        </h2>

        <button class="btn btn-back" (click)="goBack()">Volver</button>

        <div class="form-layout">
            <!-- Selector -->
            <app-skill-selector class="skill-selector" [skillGroups]="skillGroups" [selectedSkills]="selectedSkills"
                (skillToggle)="onSkillToggle($event)">
            </app-skill-selector>

            <!-- Gráfico -->
            <app-skill-timeline-chart class="chart-wrapper" [series]="chartData" [loading]="timelineLoading">
            </app-skill-timeline-chart>

            <!-- Loader del timeline -->
            <div *ngIf="timelineLoading">
                Cargando datos...
            </div>
        </div>

    </div>

</div>
