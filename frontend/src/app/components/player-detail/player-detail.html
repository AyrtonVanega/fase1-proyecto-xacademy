<div class="player-detail-container">
    <!-- Titulo de la pagina segun el modo (modo Creacion / Vista) -->
    <h2 class="page-title">
        {{ isCreationMode ? 'Crear Nuevo Jugador' : (isEditing ? 'Editar Jugador' : 'Detalle del Jugador') }}
    </h2>

    <div *ngIf="!loading && (player || isCreationMode)" [formGroup]="playerForm">

        <!-- Seccion de encabezado con nombre y botones -->
        <div class="header-section">
            <h3 class="player-name">
                {{ playerForm.get('long_name')?.value || 'Jugador sin Nombre' }}
            </h3>
            <div class="actions">

                <!-- Botones Editar / Volver (modo Vista) -->
                <div *ngIf="!isCreationMode && !isEditing" class="edit-back-buttons">
                    <button (click)="toggleEditMode()" class="btn btn-edit">Editar</button>
                    <button (click)="goBack()" class="btn btn-back">Volver</button>
                </div>

                <!-- Boton Guardar y Cancelar (modo Edicion / Creacion) -->
                <div *ngIf="isEditing || isCreationMode" class="save-cancel-buttons">
                    <button (click)="savePlayer()" class="btn btn-save" [disabled]="isSaving">Guardar</button>
                    <button (click)="toggleEditMode()" class="btn btn-cancel" [disabled]="isSaving">Cancelar</button>
                </div>

            </div>
        </div>

        <div class="form-layout">
            <!-- Informacion Basica -->
            <app-basic-info *ngIf="player || isCreationMode" [form]="playerForm" [fields]="basicInfoFields" [isEditing]="isEditing">
            </app-basic-info>

            <!-- LADO DERECHO -->
            <!-- Edicion de Habilidades (modo Edicion / Creacion) -->
            <app-skills-editor *ngIf="isEditing || isCreationMode" [form]="playerForm" [skillGroups]="skillGroups"
                [isEditing]="isEditing">
            </app-skills-editor>

            <!-- Vista de Graficos (modo Vista) -->
            <app-skills-analysis *ngIf="!isEditing && player" [skillGroups]="skillGroups">
            </app-skills-analysis>
        </div>
    </div>

    <!-- Mensaje de Error -->
    <div *ngIf="!loading && !player && !isCreationMode" class="error-message">
        <p>Jugador no encontrado</p>
    </div>
</div>
