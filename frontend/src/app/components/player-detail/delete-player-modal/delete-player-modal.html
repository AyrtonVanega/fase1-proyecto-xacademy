<div class="modal-backdrop">
    <div class="modal">

        <h2>Eliminar jugador</h2>

        <p>¿Estás seguro de que querés eliminar este jugador?</p>

        <div class="modal-actions">
            <button class="btn btn-cancel" (click)="onCancel()">Cancelar</button>
            <button class="btn btn-delete" (click)="onConfirm()">Eliminar</button>
        </div>

    </div>
</div>
